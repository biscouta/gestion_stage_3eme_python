{% extends 'base.html' %}

{% block title %}Modifier utilisateur{% endblock %}

{% block content %}
<div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-3">
    <div>
        <h1 class="h3 mb-1">Modifier utilisateur</h1>
        <p class="text-muted mb-0">{{ edited_user.username }}</p>
    </div>
    <a class="btn btn-outline-secondary mt-3 mt-md-0" href="{% url 'admin_users_list' %}">Retour</a>
</div>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" for="username">Nom d'utilisateur</label>
                    <input class="form-control" id="username" name="username" value="{{ edited_user.username }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-control" id="email" type="email" name="email" value="{{ edited_user.email }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="first_name">Prenom</label>
                    <input class="form-control" id="first_name" name="first_name" value="{{ edited_user.first_name }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="last_name">Nom</label>
                    <input class="form-control" id="last_name" name="last_name" value="{{ edited_user.last_name }}">
                </div>
                <div class="col-md-6">
                    <div class="form-check mt-2">
                        <input class="form-check-input" id="is_active" type="checkbox" name="is_active" {% if edited_user.is_active %}checked{% endif %}>
                        <label class="form-check-label fw-semibold" for="is_active">Compte actif</label>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-check mt-2">
                        <input class="form-check-input" id="is_staff" type="checkbox" name="is_staff" {% if edited_user.is_staff %}checked{% endif %}>
                        <label class="form-check-label fw-semibold" for="is_staff">Acces admin</label>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-wrap gap-2 mt-4">
                <button class="btn btn-primary" type="submit">Enregistrer</button>
                <a class="btn btn-outline-secondary" href="{% url 'admin_users_list' %}">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block title %}Modifier profil{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="h4 mb-4">Modifier mon profil</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nom complet</label>
                    <input class="form-control" type="text" name="full_name" value="{{ profile.full_name }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telephone</label>
                    <input class="form-control" type="text" name="phone" value="{{ profile.phone }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Filiere</label>
                    <input class="form-control" type="text" name="field" value="{{ profile.field }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Niveau d'etude</label>
                    <input class="form-control" type="text" name="study_level" value="{{ profile.study_level }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Competences</label>
                <textarea class="form-control" name="skills" rows="4">{{ profile.skills }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">CV</label>
                <input class="form-control" type="file" name="cv">
            </div>
            <button class="btn btn-primary" type="submit">Enregistrer</button>
            <a class="btn btn-outline-secondary" href="{% url 'student_profile' %}">Annuler</a>
        </form>
    </div>
</div>
{% endblock %}
